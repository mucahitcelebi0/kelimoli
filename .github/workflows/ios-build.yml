name: iOS Build & TestFlight Upload

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Build number (örn: 4)'
        required: true
        default: '4'
  push:
    tags: ['ios-v*']

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm deps
        run: npm ci

      - name: Patch AdMob ConsentExecutor (UMP 3.x fix)
        run: |
          cp patches/ConsentExecutor.swift \
            node_modules/@capacitor-community/admob/ios/Sources/AdMobPlugin/Consent/ConsentExecutor.swift

      - name: Sync web → iOS
        run: |
          npm run sync:web
          npx cap copy ios

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install --repo-update

      - name: Set build number
        run: |
          BN="${{ github.event.inputs.build_number || github.run_number }}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BN" \
            ios/App/App/Info.plist
          echo "Build number: $BN"

      - name: Import signing certificate
        env:
          CERT_B64: ${{ secrets.IOS_DIST_CERT_BASE64 }}
          CERT_PWD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo "$CERT_B64" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "temp123" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "temp123" $KEYCHAIN_PATH
          security import /tmp/cert.p12 -P "$CERT_PWD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          echo "=== Sertifikalar ==="
          security find-identity -v -p codesigning $KEYCHAIN_PATH
          rm /tmp/cert.p12
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Install provisioning profile
        env:
          PROFILE_B64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PROFILES_DIR=~/Library/MobileDevice/Provisioning\ Profiles
          mkdir -p "$PROFILES_DIR"
          echo "$PROFILE_B64" | base64 --decode > "$PROFILES_DIR/Kelimoli.mobileprovision"

      - name: Create ExportOptions.plist
        run: |
          cat > ios/App/ExportOptions.plist << 'PLISTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>26TL3S2A25</string>
            <key>signingStyle</key><string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.kelimoli.app</key><string>Kelimoli App Store</string>
            </dict>
            <key>stripSwiftSymbols</key><true/>
            <key>uploadBitcode</key><false/>
            <key>uploadSymbols</key><true/>
          </dict>
          </plist>
          PLISTEOF

      - name: Archive
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App \
            -configuration Release -destination 'generic/platform=iOS' \
            -archivePath build/App.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=26TL3S2A25 \
            PROVISIONING_PROFILE_SPECIFIER="Kelimoli App Store" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
            archive

      - name: Export IPA
        run: |
          cd ios/App
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/

      - name: Setup API Key
        env:
          API_KEY_B64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY_B64" | base64 --decode > \
            ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8

      - name: Upload to TestFlight
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          IPA=$(find ios/App/build -name "*.ipa" | head -1)
          echo "Upload: $IPA"
          xcrun altool --upload-app --type ios --file "$IPA" \
            --apiKey "$KEY_ID" --apiIssuer "$ISSUER_ID"
