<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
  </defs>
  <!-- Adaptive icon safe-zone: tüm görsel merkezdeki 66dp/108dp = ~62% alanda olmalı -->
  <!-- Bu yüzden K harfini ve aksan noktasını ortaya küçülterek koyuyoruz -->
  <circle cx="640" cy="380" r="32" fill="url(#gold)" opacity="0.95"/>
  <text x="512" y="640"
        font-family="Georgia, 'Playfair Display', serif"
        font-size="440"
        font-weight="800"
        text-anchor="middle"
        fill="#FAF8F3"
        letter-spacing="-12">K</text>
</svg>
